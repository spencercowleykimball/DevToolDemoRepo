<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="devtooldemo.css">

    <!-- Google Embed Code - Step 1 -->
     <!-- IBM Plex Mono, PT Sans Regular, Lora -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Lora:ital,wght@0,400..700;1,400..700&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Stick+No+Bills:wght@200..800&display=swap" rel="stylesheet">
    <title>Demo</title>
</head>

<body>
    <main>

        <p class="ibm-plex-mono-thin">
            This is font 1.
        </p>
        
        <p class="pt-sans-regular">
            This is font 2.
        </p>
        
        <p class="lora">
            Font 3. Paired with font 2.
        </p>
        
        <p>
            Here are the icons that would be paired with fonts 2 and 3.
        </p>
        <img src="icons for fonts 2 and 3.png" alt="Icons">

        <div class="card">
            <p class="young-serif-regular">
                <h2>
                    Young Serif Regular Font
                </h2>
            </p>
        </div>
    </main>
    
</body>
</html>
